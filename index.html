<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Suivi GES BVA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; margin: 40px;">

<h1>Suivi citoyen des émissions GES - BVA</h1>

<canvas id="chart" width="900" height="450"></canvas>

<script>
fetch('GES_BVA_daily_emissions.csv')
  .then(response => response.text())
  .then(data => {

    const rows = data.split('\n').slice(1);
    const labels = [];
    const values = [];

    rows.forEach(row => {
        if(row.trim() !== ""){
            const cols = row.split(',');

            if(cols.length > 1){
                labels.push(cols[0].trim());
                values.push(parseFloat(cols[1].replace(',', '.')));
            }
        }
    });

    new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Émissions (tCO2e)',
                data: values,
                borderWidth: 2,
                fill: false
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
});
</script>

</body>
</html>
