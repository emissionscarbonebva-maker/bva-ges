<script>

document.addEventListener("DOMContentLoaded", function() {

fetch('./data/EXPORT_daily_scopes.csv')
.then(response => response.text())
.then(data => {

    const rows = data.split('\n').filter(r => r.trim() !== '');
    const separator = rows[0].includes(';') ? ';' : ',';

    const headers = rows[0].split(separator);

    const labels = [];
    const datasets = [];
    const scopeNames = headers.slice(1, 6);

    scopeNames.forEach(name => {
        datasets.push({
            label: name.trim(),
            data: [],
            borderWidth: 2,
            fill: false
        });
    });

    let totalAll = 0;
    let maxValue = 0;
    let maxDate = "";

    for (let i = 1; i < rows.length; i++) {

        const cols = rows[i].split(separator);
        const date = cols[0].trim();
        labels.push(date);

        let dayTotal = 0;

        for (let j = 1; j <= 5; j++) {

            let value = cols[j]
                .replace(/\s/g, '')
                .replace(',', '.')
                .trim();

            let numeric = parseFloat(value);

            if(isNaN(numeric)){
                datasets[j-1].data.push(null);
            } else {
                datasets[j-1].data.push(numeric);
                dayTotal += numeric;
            }
        }

        totalAll += dayTotal;

        if(dayTotal > maxValue){
            maxValue = dayTotal;
            maxDate = date;
        }
    }

    const average = totalAll / labels.length;

    const totalEl = document.getElementById("total");
    const avgEl = document.getElementById("average");
    const maxEl = document.getElementById("maxDay");

    if(totalEl) totalEl.innerText =
        totalAll.toLocaleString('fr-FR', {maximumFractionDigits:0}) + " tCO₂e";

    if(avgEl) avgEl.innerText =
        average.toLocaleString('fr-FR', {maximumFractionDigits:0}) + " tCO₂e";

    if(maxEl) maxEl.innerText =
        maxDate + " (" + maxValue.toLocaleString('fr-FR', {maximumFractionDigits:0}) + " tCO₂e)";

    new Chart(document.getElementById('chart'), {
        type: 'line',
        data: { labels: labels, datasets: datasets },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { position: 'top' },
                zoom: {
                    pan: { enabled: true, mode: 'x' },
                    zoom: {
                        wheel: { enabled: true },
                        pinch: { enabled: true },
                        mode: 'x'
                    }
                }
            },
            scales: {
                x: { title: { display: true, text: 'Date' }},
                y: {
                    beginAtZero: true,
                    title: { display: true, text: 'Émissions (tCO₂e)' },
                    ticks: {
                        callback: value => value.toLocaleString('fr-FR')
                    }
                }
            }
        }
    });

});

});

</script>
