<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Suivi GES BVA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; margin: 40px;">

<h1>Suivi citoyen des émissions GES - BVA</h1>

<canvas id="chart" width="1100" height="500"></canvas>

<script>
fetch('GES_BVA_daily_emissions.csv')
  .then(response => response.text())
  .then(data => {

    const rawRows = data.split('\n');
    const rows = rawRows.filter(r => r.trim() !== '');

    const separator = rows[0].includes(';') ? ';' : ',';

    const startCol = 11; // L
    const endCol = 16;   // Q

    let baseIndex = -1;

    // Trouver la ligne i (celle avec une cellule remplie en L)
    for(let i = 0; i < rows.length; i++){
        const cols = rows[i].split(separator);
        if(cols.length > endCol && cols[startCol].trim() !== ""){
            baseIndex = i;
            break;
        }
    }

    if(baseIndex === -1 || baseIndex + 1 >= rows.length){
        alert("Structure du CSV non trouvée.");
        return;
    }

    // i+1 = entêtes
    const headers = rows[baseIndex + 1].split(separator);

    const labels = [];
    const datasets = [];

    // Créer les datasets à partir des entêtes (L à Q)
    for (let i = startCol; i <= endCol; i++) {
        datasets.push({
            label: headers[i].trim(),
            data: [],
            borderWidth: 2,
            fill: false
        });
    }

    // i+2 = début des données
    for (let i = baseIndex + 2; i < rows.length; i++) {

        const cols = rows[i].split(separator);

        if(cols.length > endCol){

            labels.push(cols[0].trim());

            let datasetIndex = 0;

            for (let j = startCol; j <= endCol; j++) {

                let value = cols[j].replace(',', '.').trim();

                if(value === "" || isNaN(value)){
                    datasets[datasetIndex].data.push(null);
                } else {
                    datasets[datasetIndex].data.push(parseFloat(value));
                }

                datasetIndex++;
            }
        }
    }

    new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: datasets
        },
        options: {
            responsive: true,
            interaction: {
                mode: 'index',
                intersect: false
            },
            plugins: {
                legend: {
                    display: true,
                    position: 'top'
                }
            },
            scales: {
                x: {
                    title: {
                        display: true,
                        text: 'Date'
                    }
                },
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Émissions (tCO2e)'
                    }
                }
            }
        }
    });

});
</script>

</body>
</html>
