<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Suivi GES BVA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; margin: 40px;">

<h1>Suivi citoyen des émissions GES - BVA</h1>

<canvas id="chart" width="1100" height="500"></canvas>

<script>
fetch('GES_BVA_daily_emissions.csv')
  .then(response => response.text())
  .then(data => {

    const rows = data.split('\n').filter(r => r.trim() !== '');
    const headers = rows[0].split(',');

    const labels = [];
    const datasets = [];

    // Colonnes L à Q = index 11 à 16
    const startCol = 11;
    const endCol = 16;

    // Créer datasets uniquement pour L → Q
    for (let i = startCol; i <= endCol; i++) {
        datasets.push({
            label: headers[i].trim(),
            data: [],
            borderWidth: 2,
            fill: false
        });
    }

    // Lire les lignes
    for (let i = 1; i < rows.length; i++) {
        const cols = rows[i].split(',');

        labels.push(cols[0].trim()); // colonne A = dates

        let datasetIndex = 0;

        for (let j = startCol; j <= endCol; j++) {
            datasets[datasetIndex].data.push(
                parseFloat(cols[j].replace(',', '.'))
            );
            datasetIndex++;
        }
    }

    new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: datasets
        },
        options: {
            responsive: true,
            interaction: {
                mode: 'index',
                intersect: false
            },
            plugins: {
                legend: {
                    display: true
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

});
</script>

</body>
</html>
