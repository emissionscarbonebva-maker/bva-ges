<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Émissions carbone Aéroport Paris-Beauvais (BVA) – Analyse indépendante</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.2.1"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { font-family: 'Segoe UI', sans-serif; margin:0; background:#f4f6f8; color:#222;}
header { background:#1f3c88; color:white; padding:25px;}
.container { width:92%; max-width:1300px; margin:40px auto;}
.card { background:white; padding:25px; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,0.08); margin-bottom:30px;}
.metrics { display:flex; gap:20px; flex-wrap:wrap;}
.metric-box { flex:1; min-width:220px; background:#eef2f7; padding:20px; border-radius:10px;}
.metric-value { font-size:1.8em; font-weight:bold; margin-top:8px;}
canvas { margin-top:20px;}
table { width:100%; border-collapse:collapse; margin-top:15px;}
th, td { padding:8px; border-bottom:1px solid #ddd; text-align:left; font-size:0.9em;}
th { background:#f0f2f5;}
footer { text-align:center; padding:30px; font-size:0.9em; color:#666;}
</style>

</head>

<body>

<header>
<h1>Aéroport Paris-Beauvais (BVA) - Suivi indépendant des émissions de GES</h1>
<p>Données issues des exports automatisés – Mise à jour GitHub</p>
</header>

<div class="container">

<div class="card">
<h2>Émissions journalières par compagnie</h2>
<canvas id="chartAirlines"></canvas>
</div>

<div class="card">
<h2>Rotations journalières par compagnie</h2>
<canvas id="chartRotations"></canvas>
</div>

</div>

<footer>
Projet citoyen indépendant – Transparence des données
</footer>

<script>

document.addEventListener("DOMContentLoaded", function(){

function parseCSV(url, callback){
fetch(url)
.then(r=>r.text())
.then(data=>{
const rows=data.split('\n').filter(r=>r.trim()!='');
const headers=rows[0].split(',');
const result=[];
for(let i=1;i<rows.length;i++){
let cols=rows[i].split(',');
let obj={};
headers.forEach((h,index)=>obj[h.trim()]=cols[index]?.trim());
result.push(obj);
}
callback(result);
});
}

function createChart(canvasId, labels, datasets){
new Chart(document.getElementById(canvasId),{
type:'line',
data:{labels:labels,datasets:datasets},
options:{
responsive:true,
interaction:{mode:'index',intersect:false},
plugins:{legend:{position:'top'},
zoom:{pan:{enabled:true,mode:'x'},
zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'x'}}},
scales:{y:{beginAtZero:true}}
}
});
}

/* ===== AIRLINES & ROTATIONS ===== */

parseCSV('./data/EXPORT_daily_vols.csv',(data)=>{

// Regrouper les données par date
let dates = [...new Set(data.map(d => d.date))].sort();
let compagnies = [...new Set(data.map(d => d.compagnie))];

// Initialiser structures
let emissionsDatasets = [];
let rotationsDatasets = [];

compagnies.forEach(compagnie => {

let emissionsData = [];
let rotationsData = [];

dates.forEach(date => {

let row = data.find(d => d.date === date && d.compagnie === compagnie);

if(row){
emissionsData.push(parseFloat(row.emissions));
rotationsData.push(parseFloat(row.rotations));
} else {
emissionsData.push(0);
rotationsData.push(0);
}

});

emissionsDatasets.push({
label: compagnie,
data: emissionsData,
borderWidth: 2,
fill: false
});

rotationsDatasets.push({
label: compagnie,
data: rotationsData,
borderWidth: 2,
fill: false
});

});

createChart("chartAirlines", dates, emissionsDatasets);
createChart("chartRotations", dates, rotationsDatasets);

});

});

</script>

</body>
</html>
