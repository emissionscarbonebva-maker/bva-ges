<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Suivi GES BVA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; margin: 40px;">

<h1>Suivi citoyen des émissions GES - BVA</h1>

<canvas id="chart" width="1100" height="500"></canvas>

<script>
fetch('GES_BVA_daily_emissions.csv')
  .then(response => response.text())
  .then(data => {

    const rows = data.split('\n').filter(r => r.trim() !== '');

    // Détection du séparateur
    const separator = rows[0].includes(';') ? ';' : ',';

    const headerRowIndex = 5; // Ligne 6 (index 5)
    const headers = rows[headerRowIndex].split(separator);

    const labels = [];
    const datasets = [];

    const startCol = 11; // colonne L
    const endCol = 16;   // colonne Q

    // Créer les séries à partir des en-têtes ligne 6
    for (let i = startCol; i <= endCol; i++) {
        datasets.push({
            label: headers[i].trim(),
            data: [],
            borderWidth: 2,
            fill: false
        });
    }

    // Lire les données à partir de la ligne suivante
    for (let i = headerRowIndex + 1; i < rows.length; i++) {

        const cols = rows[i].split(separator);

        if(cols.length > endCol){

            labels.push(cols[0].trim());

            let datasetIndex = 0;

            for (let j = startCol; j <= endCol; j++) {

                let value = cols[j].replace(',', '.').trim();

                if(value === "" || isNaN(value)){
                    datasets[datasetIndex].data.push(null);
                } else {
                    datasets[datasetIndex].data.push(parseFloat(value));
                }

                datasetIndex++;
            }
        }
    }

    new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: datasets
        },
        options: {
            responsive: true,
            interaction: {
                mode: 'index',
                intersect: false
            },
            plugins: {
                legend: {
                    display: true,
                    position: 'top'
                }
            },
            scales: {
                x: {
                    title: {
                        display: true,
                        text: 'Date'
                    }
                },
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Émissions (tCO2e)'
                    }
                }
            }
        }
    });

});
</script>

</body>
</html>
